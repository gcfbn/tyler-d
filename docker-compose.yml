services:
  ollama:
    image: ollama/ollama:latest
    container_name: tyler-d-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    profiles: ["ollama"]
    entrypoint: /bin/sh
    command:
      - -c
      - |
        ollama serve &
        sleep 5
        ollama pull SpeakLeash/bielik-11b-v3.0-instruct:Q4_K_M
        ollama pull bge-m3
        wait

  qdrant:
    image: qdrant/qdrant:latest
    container_name: tyler-d-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  ocr:
    build:
      context: .
      dockerfile: services/ocr/Dockerfile
    container_name: tyler-d-ocr
    ports:
      - "50051:50051"
    restart: unless-stopped

  orchestrator:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    container_name: tyler-d-orchestrator
    ports:
      - "50052:50052"
    depends_on:
      - qdrant
      - llm-gateway
      - ocr
    environment:
      - QDRANT_URL=${QDRANT_URL}
      - LLM_GATEWAY_URL=${LLM_GATEWAY_URL}
      - OCR_URL=${OCR_URL}
      - VECTOR_DIMENSION=${VECTOR_DIMENSION}
    restart: unless-stopped

  llm-gateway:
    build:
      context: .
      dockerfile: services/llm_gateway/Dockerfile
    container_name: tyler-d-llm-gateway
    ports:
      - "50053:50053"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER}
      - LLM_MODEL=${LLM_MODEL}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_URL=${LLM_URL}
      - OLLAMA_URL=${OLLAMA_URL}
      - USE_EXTERNAL_EMBEDDINGS=${USE_EXTERNAL_EMBEDDINGS}
    restart: unless-stopped

volumes:
  ollama_data:
  qdrant_data:

version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: tscherepacha-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: always

  qdrant:
    image: qdrant/qdrant:latest
    container_name: tscherepacha-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always

volumes:
  ollama_data:
  qdrant_data:
